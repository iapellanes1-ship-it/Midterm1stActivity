{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <h2>{{ object.title }}</h2>
                <span class="badge {{ 'bg-success' if object.completed else 'bg-warning' }}">
                    {{ 'Completed' if object.completed else 'Pending' }}
                </span>
            </div>
            <div class="card-body">
                {% if object.description %}
                <p class="card-text">{{ object.description }}</p>
                {% endif %}
                <p class="text-muted">Created: {{ object.created_at|date:"M d, Y H:i" }}</p>
            </div>
            <div class="card-footer">
                <a href="{% url 'task_update' object.pk %}" class="btn btn-warning me-2">Edit</a>
                <a href="{% url 'task_delete' object.pk %}" class="btn btn-danger me-2">Delete</a>
                <a href="{% url 'task_list' %}" class="btn btn-secondary">Back to List</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
